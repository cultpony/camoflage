replicaCount: 1

image:
  repository: ghcr.io/cultpony/camoflage
  tag: ""  # defaults to Chart appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

# Secret key configuration.
# Either provide secretKey directly (stored in a generated Secret) or
# reference an existing secret with secretKeyExistingSecret.
secretKey: ""
secretKeyExistingSecret: ""
secretKeyExistingSecretKey: "CAMO_SECRET_KEY"

# Optional: separate key for the /sign/ endpoint
signRequestKey: ""

env:
  CAMO_PORT: "8081"
  RUST_LOG: "warn"
  # OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  # CAMO_EXT_HOST: "camo.example.com"
  # CAMO_HEADER_VIA: "Camoflage Asset Proxy"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 2
  periodSeconds: 5

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
