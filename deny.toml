[graph]
# Targets to check. If empty, all targets are checked.
targets = []

[licenses]
# Accepted licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "AGPL-3.0-or-later",
    "NCSA",
    "CDLA-Permissive-2.0",
]
# Confidence threshold for detecting licenses
confidence-threshold = 0.8

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"

[advisories]
# Deny crates with security vulnerabilities
version = 2
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436), transitive dep via image -> ravif -> rav1e -> paste
    # No safe upgrade available; ignoring until image crate drops rav1e or rav1e replaces paste.
    "RUSTSEC-2024-0436",
]

[sources]
# Allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
